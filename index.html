<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天才小釣手・大班｜數與量配對</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Varela+Round&display=swap" rel="stylesheet">

<style>
/* ── 馬卡龍色票 ──
   粉藍  #b5d8f7   粉紫  #d4b8f0   粉桃  #f7c5c5
   粉綠  #b8e8c8   粉黃  #fde9a2   粉橘  #fdd0a2
   白    #fffdf9   字深  #5a4a6a  */

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --mac-blue:   #b5d8f7;
  --mac-purple: #d4b8f0;
  --mac-peach:  #f7c5c5;
  --mac-green:  #b8e8c8;
  --mac-yellow: #fde9a2;
  --mac-orange: #fdd0a2;
  --mac-cream:  #fffdf9;
  --mac-text:   #5a4a6a;
  --mac-blue-d: #7aadda;
  --mac-purple-d: #a07eca;
  --mac-orange-d: #e8a870;
}

body {
  font-family: 'Varela Round', 'Noto Sans TC', sans-serif;
  background: linear-gradient(150deg,
    #fde9f4 0%,
    #e8d9f7 20%,
    #cce8f7 45%,
    #ccf0e0 70%,
    #fde9c0 100%);
  min-height: 100vh;
  overflow-x: hidden;
  touch-action: manipulation;
  user-select: none;
}

/* ── 泡泡（粉色系） ── */
.bubble {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { transform: translateY(105vh) scale(0.3); opacity: 0; }
  10%  { opacity: 0.7; }
  90%  { opacity: 0.4; }
  100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
}

/* ── 卡片 ── */
.card-wrap {
  perspective: 900px;
  cursor: pointer;
  /* 用 vw 讓卡片自動縮放，手機不會太擠 */
  width: clamp(90px, 22vw, 130px);
  height: clamp(115px, 27vw, 160px);
  margin: clamp(4px, 1.2vw, 8px);
  flex-shrink: 0;
  transition: opacity 0.4s;
  /* 手機觸控：加大實際可點擊感知 */
  -webkit-tap-highlight-color: transparent;
}
/* 平板直式：稍大 */
@media (min-width: 600px) and (max-width: 1023px) {
  .card-wrap { width: clamp(110px, 18vw, 140px); height: clamp(138px, 22vw, 175px); }
}
/* 桌機 */
@media (min-width: 1024px) {
  .card-wrap { width: 130px; height: 160px; margin: 8px; }
}
.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
}
.card-wrap.flipped .card-inner { -webkit-transform: rotateY(180deg); transform: rotateY(180deg); }
.card-wrap.matched { opacity: 0; pointer-events: none; transition: opacity 0.6s; }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 5px solid rgba(255,255,255,0.95);
  box-shadow: 0 6px 18px rgba(160,120,200,0.18), inset 0 1px 0 rgba(255,255,255,0.7);
  overflow: hidden;
  will-change: transform;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}

/* 卡背 A：粉藍（數字池） */
.card-back-face.type-a {
  background: linear-gradient(135deg, #a8ccf0, #c5e0f9, #daeeff);
  font-size: 3rem;
}
/* 卡背 B：粉橘（數量池） */
.card-back-face.type-b {
  background: linear-gradient(135deg, #f5b8a0, #fdd0b8, #ffe4cc);
  font-size: 3rem;
}
/* 點點裝飾 */
.card-back-face::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.5) 2px, transparent 2px);
  background-size: 18px 18px;
}

/* 卡面白底 */
.card-front-face {
  background: #fffdf9;
  -webkit-transform: rotateY(180deg);
  transform: rotateY(180deg);
  padding: 8px;
}
.card-front-face img {
  width: 100%; height: 100%;
  object-fit: contain;
  border-radius: 12px;
}

/* ── 提示閃爍 ── */
@keyframes hintPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(253,233,162,0); transform: scale(1); }
  50%      { box-shadow: 0 0 0 14px rgba(253,210,80,0.65); transform: scale(1.05); }
}
.card-wrap.hinting .card-inner { animation: hintPulse 0.85s ease-in-out infinite; }

/* ── 答錯抖動 ── */
@keyframes shake {
  0%,100% { transform: rotateY(180deg) translateX(0); }
  20%     { transform: rotateY(180deg) translateX(-8px); }
  40%     { transform: rotateY(180deg) translateX(8px); }
  60%     { transform: rotateY(180deg) translateX(-5px); }
  80%     { transform: rotateY(180deg) translateX(5px); }
}
.card-wrap.wrong .card-inner { animation: shake 0.5s ease; }

/* ── 引導箭頭 ── */
.guide-arrow {
  font-size: 2.5rem;
  animation: arrowBounce 0.9s ease-in-out infinite alternate;
  display: inline-block;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
}
@keyframes arrowBounce {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-8px) scale(1.12); }
}

/* ── 分數魚 ── */
.fish-score { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }
.fish-icon { font-size: 1.5rem; }
.fish-icon.earned { animation: fishPop 0.4s ease; }
@keyframes fishPop {
  0%   { transform: scale(0) rotate(-30deg); }
  60%  { transform: scale(1.4) rotate(10deg); }
  100% { transform: scale(1) rotate(0); }
}

/* ── 魚簍搖晃 ── */
@keyframes bucketBounce {
  0%   { transform: rotate(0); }
  25%  { transform: rotate(-15deg) scale(1.15); }
  50%  { transform: rotate(15deg) scale(1.2); }
  75%  { transform: rotate(-8deg) scale(1.1); }
  100% { transform: rotate(0) scale(1); }
}
.bucket-bounce { animation: bucketBounce 0.6s ease; }

/* ── 池塘 ── */
.pond {
  border-radius: 28px;
  padding: 16px 12px 20px;
  position: relative;
  transition: box-shadow 0.3s;
}
.pond-a {
  background: rgba(181,216,247,0.45);
  border: 4px solid rgba(181,216,247,0.9);
}
.pond-b {
  background: rgba(253,208,162,0.45);
  border: 4px solid rgba(253,208,162,0.9);
}
.pond-active {
  box-shadow: 0 0 0 5px rgba(253,210,80,0.75), 0 0 28px rgba(253,210,80,0.35);
}
.pond-label {
  position: absolute;
  top: -20px; left: 50%;
  transform: translateX(-50%);
  padding: 6px 22px;
  border-radius: 30px;
  font-weight: 900;
  font-size: 1rem;
  border: 4px solid white;
  white-space: nowrap;
  box-shadow: 0 4px 10px rgba(160,120,200,0.2);
}

/* ── 步驟橫幅 ── */
.step-banner {
  background: rgba(255,253,249,0.92);
  backdrop-filter: blur(10px);
  border-radius: 50px;
  padding: 10px 24px;
  font-weight: 900;
  font-size: 1.1rem;
  color: var(--mac-text);
  box-shadow: 0 4px 16px rgba(160,120,200,0.14);
  text-align: center;
  transition: all 0.4s ease;
  border: 3px solid rgba(255,255,255,0.9);
}
.step-banner.step-a  { border-color: var(--mac-blue-d);   color: #3d6fa0; }
.step-banner.step-b  { border-color: var(--mac-orange-d); color: #b06030; }
.step-banner.step-ok { border-color: #88cc99;             color: #2a6640; }

/* ── 飛魚 ── */
.flying-card {
  position: fixed; z-index: 999; pointer-events: none;
  border-radius: 16px; border: 5px solid white; overflow: hidden;
  transition: all 0.7s cubic-bezier(0.3,-0.3,0.2,1.5);
}

/* ── 煙火 ── */
@keyframes firework {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--dx),var(--dy)) scale(0); opacity: 0; }
}
.firework-particle {
  position: fixed; width: 10px; height: 10px; border-radius: 50%;
  pointer-events: none; z-index: 200;
  animation: firework 0.85s ease-out forwards;
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(90,74,106,0.88); color: white;
  padding: 12px 28px; border-radius: 50px;
  font-weight: 700; font-size: 1rem;
  z-index: 9999; pointer-events: none;
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
  opacity: 0; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── 勝利畫面 ── */
#win-modal {
  position: fixed; inset: 0; z-index: 50; display: none;
  background: rgba(90,74,106,0.55); backdrop-filter: blur(8px);
  align-items: center; justify-content: center;
}
#win-modal.show { display: flex; }
@keyframes winPop {
  0%   { transform: scale(0.5); opacity: 0; }
  70%  { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}
.win-box { animation: winPop 0.5s ease forwards; }

/* ── 按鈕 ── */
.btn-primary {
  background: linear-gradient(180deg, #c5e0f9, #8dbde8);
  color: #2d5a8a; font-weight: 900; border-radius: 18px;
  padding: 14px 28px; font-size: 1.15rem;
  box-shadow: 0 8px 0 #6a9dc8;
  transition: all 0.15s; border: none; cursor: pointer;
}
.btn-primary:active { box-shadow: 0 2px 0 #6a9dc8; transform: translateY(6px); }

.btn-yellow {
  background: linear-gradient(180deg, #fde9a2, #f9cc55);
  color: #7a5500; font-weight: 900; border-radius: 18px;
  padding: 14px 28px; font-size: 1.15rem;
  box-shadow: 0 8px 0 #d4a020;
  transition: all 0.15s; border: none; cursor: pointer;
}
.btn-yellow:active { box-shadow: 0 2px 0 #d4a020; transform: translateY(6px); }

/* ── 難度按鈕 ── */
.diff-btn {
  border: 4px solid transparent;
  border-radius: 20px;
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s;
  background: white;
  box-shadow: 0 4px 12px rgba(160,120,200,0.15);
}
.diff-btn:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(160,120,200,0.22); }
.diff-btn.selected { border-color: var(--mac-purple-d); box-shadow: 0 0 0 3px rgba(160,126,202,0.3); }
.diff-btn .diff-num { font-size: 2rem; font-weight: 900; color: var(--mac-text); }
.diff-btn .diff-label { font-size: 0.8rem; color: #a090b8; font-weight: 700; margin-top: 4px; }

/* ── 補牌動畫 ── */
@keyframes cardReveal {
  from { transform: scale(0.5) rotate(-15deg); opacity: 0; }
  to   { transform: scale(1) rotate(0); opacity: 1; }
}
.card-wrap.new-card { animation: cardReveal 0.4s cubic-bezier(.34,1.56,.64,1); }

/* ── 手機 Header ── */
@media (max-width: 599px) {
  .speech-bubble { font-size: 0.85rem; padding: 8px 12px; max-width: 160px; }
  .step-banner { font-size: 0.95rem; padding: 8px 16px; }
  /* 池塘標籤文字縮小 */
  .pond-label { font-size: 0.85rem; padding: 5px 14px; }
  /* 引導箭頭改為向下（手機直式兩池上下排列） */
  .guide-arrow { font-size: 2rem; }
  /* 按鈕觸控更大 */
  .btn-primary, .btn-yellow { padding: 16px 20px; font-size: 1.1rem; }
  /* 難度按鈕縮 */
  .diff-btn { padding: 10px 6px; }
  .diff-btn .diff-num { font-size: 1.6rem; }
  .diff-btn .diff-label { font-size: 0.72rem; }
  /* 魚簍圖示縮 */
  .fish-icon { font-size: 1.2rem; }
}

/* ── 平板（600-1023px）── */
@media (min-width: 600px) and (max-width: 1023px) {
  .step-banner { font-size: 1.05rem; }
  .btn-primary, .btn-yellow { padding: 16px 28px; font-size: 1.2rem; }
}

/* ── 避免 iOS Safari 底部被 home bar 遮住 ── */
body { padding-bottom: env(safe-area-inset-bottom, 16px); }

/* ── 池塘在手機上上下排，平板以上左右排 ── */
/* （由 Tailwind flex-col / lg:flex-row 控制，這裡加 gap 補強） */
@media (max-width: 1023px) {
  #game-screen > div:first-child { gap: 20px; }
  /* 兩池之間的箭頭手機改向下 */
  #guide-arrow { transform: rotate(90deg); display: block; }
  .guide-arrow { animation: arrowBounceDown 0.9s ease-in-out infinite alternate; }
}
@keyframes arrowBounceDown {
  from { transform: rotate(90deg) translateY(0) scale(1); }
  to   { transform: rotate(90deg) translateY(-8px) scale(1.12); }
}
@media (min-width: 1024px) {
  #guide-arrow { transform: none; }
  .guide-arrow { animation: arrowBounce 0.9s ease-in-out infinite alternate; }
}

/* ── 角色氣泡 ── */
.speech-bubble {
  position: relative;
  background: var(--mac-cream);
  border-radius: 20px;
  padding: 10px 16px;
  font-weight: 900;
  font-size: 1rem;
  color: var(--mac-text);
  box-shadow: 0 4px 12px rgba(160,120,200,0.18);
  border: 3px solid rgba(212,184,240,0.7);
  max-width: 240px;
  text-align: center;
  transition: all 0.4s;
}
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -14px; left: 50%;
  transform: translateX(-50%);
  border: 8px solid transparent;
  border-top-color: var(--mac-cream);
}
</style>
</head>

<body class="flex flex-col items-center min-h-screen pb-16">

<!-- 泡泡背景 -->
<div id="bubbles" class="fixed inset-0 pointer-events-none overflow-hidden z-0"></div>

<!-- ======= Header ======= -->
<header class="w-full max-w-4xl px-3 py-2 flex justify-between items-center z-20 sticky top-0" style="padding-top:max(8px,env(safe-area-inset-top))">
  <div class="flex items-center gap-2 min-w-0 flex-1">
    <div id="mascot" class="text-4xl md:text-5xl cursor-pointer select-none flex-shrink-0">🎣</div>
    <div class="speech-bubble" id="speech-bubble" style="min-width:0;flex:1">來釣魚囉！</div>
  </div>

  <div class="flex items-center gap-2 flex-shrink-0 ml-2">
    <!-- 計時器 -->
    <div class="flex flex-col items-center px-3 py-1.5 md:px-4 md:py-2 rounded-2xl shadow-lg border-2 border-white" id="timer-box" style="background:rgba(255,253,249,0.88);backdrop-filter:blur(8px);display:none!important">
      <div class="text-xl md:text-2xl">⏱️</div>
      <div class="text-base md:text-lg font-black leading-none mt-0.5" style="color:#7aadda" id="timer-display">0:00</div>
      <div class="text-xs font-black mt-0.5" style="color:#a0c8e8">計時</div>
    </div>

    <!-- 魚簍分數 -->
    <div class="flex flex-col items-center px-3 py-1.5 md:px-4 md:py-2 rounded-2xl shadow-lg border-2 border-white" style="background:rgba(255,253,249,0.88);backdrop-filter:blur(8px)">
      <div class="text-xl md:text-2xl" id="bucket-icon">🪣</div>
      <div id="fish-score" class="fish-score mt-0.5"></div>
      <div class="text-xs font-black mt-0.5" style="color:#a07eca" id="score-text">0 / 0</div>
    </div>
  </div>
</header>

<!-- 步驟引導橫幅 -->
<div class="w-full max-w-4xl px-4 mb-2 z-10">
  <div class="step-banner" id="step-banner">準備釣魚中...</div>
</div>

<!-- ======= 開始畫面 ======= -->
<div id="start-screen" class="w-full max-w-lg px-4 z-10 mt-4">
  <div class="rounded-3xl shadow-2xl p-8 border-4 border-white text-center" style="background:rgba(255,253,249,0.93);backdrop-filter:blur(12px)">

    <div class="text-7xl mb-2 animate-bounce">🐠</div>
    <h1 class="text-3xl font-black mb-0.5" style="color:#5a4a6a">天才小釣手</h1>
    <div class="inline-block px-4 py-1 rounded-full font-black text-sm mb-5 border-2" style="background:#fdd0a2;color:#7a3800;border-color:#e8a870">
      🌟 大班 🌟
    </div>

    <p class="font-bold mb-6 text-base leading-relaxed" style="color:#8070a0">
      幫數字找到數量一樣多的好朋友！<br>
      <span style="color:#7aadda">先翻藍色</span>，再翻<span style="color:#e8a870">橘色</span>，配對就成功！
    </p>

    <!-- 難度選擇 -->
    <p class="font-black mb-3 text-base" style="color:#5a4a6a">今天要釣幾條魚？🐟</p>
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="diff-btn" onclick="selectDiff(4)" id="diff-4">
        <div class="diff-num">4組</div>
        <div class="diff-label">🌟 初學者</div>
      </div>
      <div class="diff-btn selected" onclick="selectDiff(6)" id="diff-6">
        <div class="diff-num">6組</div>
        <div class="diff-label">⭐⭐ 挑戰者</div>
      </div>
      <div class="diff-btn" onclick="selectDiff(8)" id="diff-8">
        <div class="diff-num">8組</div>
        <div class="diff-label">🏆 小高手</div>
      </div>
    </div>

    <button id="start-btn" class="btn-primary w-full text-xl" onclick="startGame()" disabled>
      開始釣魚！🎣
    </button>
    <p id="loading-text" class="mt-4 text-sm font-bold" style="color:#b0a0c8">正在準備圖片...</p>
  </div>
</div>

<!-- ======= 遊戲畫面 ======= -->
<div id="game-screen" class="hidden w-full max-w-4xl px-3 z-10 mt-2">
  <div class="flex flex-col md:flex-row gap-4 md:gap-6 items-stretch">

    <!-- A池 - 數字 -->
    <div class="flex-1 pond pond-a relative pt-8">
      <div class="pond-label text-white" style="background:#8dbde8">🟦 數字池塘</div>
      <div id="grid-a" class="flex flex-wrap justify-center items-center" style="min-height:clamp(100px,28vw,160px)"></div>
    </div>

    <!-- 中間引導箭頭 -->
    <div class="flex md:flex-col items-center justify-center py-1 md:py-2">
      <span class="guide-arrow" id="guide-arrow">➡️</span>
    </div>

    <!-- B池 - 數量 -->
    <div class="flex-1 pond pond-b relative pt-8">
      <div class="pond-label text-white" style="background:#e8a870">🟧 數量池塘</div>
      <div id="grid-b" class="flex flex-wrap justify-center items-center" style="min-height:clamp(100px,28vw,160px)"></div>
    </div>
  </div>

  <!-- 重玩 & 提示按鈕 -->
  <div class="flex justify-center gap-3 mt-4 md:mt-6">
    <button onclick="startGame()" class="font-black px-5 py-3 rounded-2xl shadow-lg border-2 border-white transition text-sm md:text-base" style="background:rgba(255,253,249,0.88);color:#5a4a6a;backdrop-filter:blur(6px)">
      🔄 重新開始
    </button>
    <button onclick="giveHint()" id="hint-btn" class="font-black px-5 py-3 rounded-2xl shadow-lg border-2 transition text-sm md:text-base" style="background:rgba(253,233,162,0.9);color:#7a5500;border-color:#fde9a2;backdrop-filter:blur(6px)">
      💡 給我提示
    </button>
  </div>
</div>

<!-- ======= 勝利畫面 ======= -->
<div id="win-modal">
  <div class="win-box rounded-3xl p-8 md:p-10 text-center shadow-2xl border-4 border-white max-w-sm w-full mx-4" style="background:#fffdf9">
    <div class="text-7xl mb-4">🏆</div>
    <h2 class="text-3xl font-black mb-2" style="color:#a07eca" id="win-title">超厲害！</h2>
    <p class="text-xl font-bold mb-2" style="color:#8070a0" id="win-msg">你把所有魚都釣光了！</p>
    <div id="win-fish-display" class="text-3xl mb-3 tracking-wide"></div>

    <!-- 完成時間 -->
    <div class="rounded-2xl px-6 py-3 mb-4 border-2 inline-block" style="background:#e8f4fd;border-color:#b5d8f7">
      <p class="text-sm font-black" style="color:#4a90c0">⏱️ 完成時間</p>
      <p class="text-3xl font-black leading-tight" style="color:#2a6090" id="win-time">0:00</p>
    </div>

    <!-- 升級提示 -->

<!-- Toast -->
<div id="toast"></div>

<script>
// ======================================================
// 全域狀態
// ======================================================
const STORAGE_KEY = 'fishing_game_senior_v1';
const MIN_PAIRS = 4;

let GAME_DATA = [];       // 全部10組圖片（1-10）
let ACTIVE_PAIRS = 6;     // 預設6組

let flippedA = null;      // 當前翻開的A卡
let flippedB = null;      // 當前翻開的B卡
let isLocked = false;
let matchedCount = 0;
let totalPairs = 0;
let hintTimeout = null;
let speechTimeout = null;
let timerStart = null;    // 計時開始時間
let timerInterval = null; // 計時器

// 音效物件
let sfxFlip, sfxMatch, sfxWrong, sfxWin;
// 語音
let voiceReady = false;
let zhVoice = null;

// 角色對話庫
const phrases = {
  start: ['來釣魚囉！','準備好了嗎？','一起去釣魚！'],
  pickA: ['先翻藍色！','翻開數字！','數字在藍色池塘'],
  pickB: ['再翻橘色！','找到數量朋友！','橘色池塘找找看'],
  match: ['配對成功！太棒了！','哇！釣到囉！','你好聰明！','好厲害！'],
  wrong: ['再試試看！','哎呀！換一張','沒關係，再來！'],
  hint: ['我來幫你找！','看這裡喔！'],
  win: ['全部釣光了！','你是釣魚大師！','太厲害了！'],
};

// ======================================================
// 工具
// ======================================================
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { return [...arr].sort(() => 0.5 - Math.random()); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

function speak(key) {
  const bubble = document.getElementById('speech-bubble');
  const text = rand(phrases[key]);
  bubble.textContent = text;
  bubble.style.transform = 'scale(1.12)';
  bubble.style.background = key === 'match' ? '#fffde7' : key === 'wrong' ? '#fce4ec' : 'white';
  clearTimeout(speechTimeout);
  speechTimeout = setTimeout(() => {
    bubble.style.transform = '';
    bubble.style.background = 'white';
  }, 600);
  // 真正說出聲音
  sayAloud(text);
}

function setBanner(msg, cls='') {
  const b = document.getElementById('step-banner');
  b.textContent = msg;
  b.className = 'step-banner ' + cls;
}

// ======================================================
// 圖片生成 (Canvas)
// ======================================================
function genNumber(num) {
  const c = document.createElement('canvas');
  c.width = c.height = 300;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#f0f8ff';
  ctx.fillRect(0, 0, 300, 300);
  // 兩位數自動縮小字體
  const fontSize = num >= 10 ? 155 : 200;
  ctx.font = `bold ${fontSize}px "Varela Round", sans-serif`;
  ctx.fillStyle = '#1565c0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(num, 150, 165);
  return c.toDataURL();
}

function genQuantity(emoji, count) {
  const c = document.createElement('canvas');
  c.width = c.height = 300;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#fff8f0';
  ctx.fillRect(0, 0, 300, 300);

  // 依數量決定字體大小與每列數量
  let fontSize, cols;
  if (count <= 5)       { fontSize = 72; cols = 3; }
  else if (count <= 9)  { fontSize = 58; cols = 3; }
  else if (count <= 12) { fontSize = 50; cols = 4; }
  else if (count <= 16) { fontSize = 44; cols = 4; }
  else                  { fontSize = 38; cols = 5; }

  const rows = Math.ceil(count / cols);
  const padX = fontSize * 0.1;
  const padY = fontSize * 0.1;
  const cellW = (300 - padX * 2) / cols;
  const cellH = (300 - padY * 2) / rows;

  ctx.font = `${fontSize}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let i = 0; i < count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = padX + cellW * col + cellW / 2;
    const y = padY + cellH * row + cellH / 2 + fontSize * 0.1;
    ctx.fillText(emoji, x, y);
  }
  return c.toDataURL();
}

function createDefaultData() {
  // 大班：從 3-20 隨機洗牌（共18個數字）
  const emojis = ['🍎','🦆','⭐','🌸','🎈','🐸','🍓','🌈','🦋','🐥',
                  '🍊','🐬','🌻','🍇','🐝','🎀','🐠','🍄'];
  const allNums = Array.from({length: 18}, (_, i) => i + 3); // 3~20
  const shuffledNums = shuffle(allNums);
  return shuffledNums.map((num, i) => ({
    id: num,
    imgA: genNumber(num),
    imgB: genQuantity(emojis[i % emojis.length], num),
  }));
}

// ======================================================
// 資料管理（中班：每次隨機產生 1-10）
// ======================================================
function loadData() {
  GAME_DATA = createDefaultData();
}


// ======================================================
// 音效 (Tone.js 木琴 + 鋼琴)
// ======================================================
function initSound() {
  if (!window.Tone) return;
  try {
    // 翻牌音：輕巧木魚 click
    sfxFlip = new Tone.MembraneSynth({
      pitchDecay: 0.008,
      octaves: 2,
      oscillator: { type: 'sine' },
      envelope: { attack: 0.001, decay: 0.08, sustain: 0, release: 0.05 }
    }).toDestination();
    sfxFlip.volume.value = -8;

    // 配對成功：木琴三音 (AM synth 模擬木琴音色)
    sfxMatch = new Tone.PolySynth(Tone.AMSynth, {
      harmonicity: 3,
      oscillator: { type: 'sine' },
      envelope: { attack: 0.005, decay: 0.4, sustain: 0, release: 0.6 },
      modulation: { type: 'square' },
      modulationEnvelope: { attack: 0.002, decay: 0.2, sustain: 0, release: 0.2 }
    }).toDestination();
    sfxMatch.volume.value = -4;

    // 答錯音：低沉溫和的「咚」，不嚇人
    sfxWrong = new Tone.MembraneSynth({
      pitchDecay: 0.05,
      octaves: 3,
      oscillator: { type: 'sine' },
      envelope: { attack: 0.001, decay: 0.3, sustain: 0, release: 0.2 }
    }).toDestination();
    sfxWrong.volume.value = -10;

    // 勝利旋律：鋼琴感 (FM synth)
    sfxWin = new Tone.PolySynth(Tone.FMSynth, {
      harmonicity: 3,
      modulationIndex: 10,
      oscillator: { type: 'sine' },
      envelope: { attack: 0.01, decay: 0.3, sustain: 0.2, release: 1 },
      modulation: { type: 'sine' },
      modulationEnvelope: { attack: 0.01, decay: 0.2, sustain: 0.1, release: 0.5 }
    }).toDestination();
    sfxWin.volume.value = -6;

  } catch(e) { console.warn('音效初始化失敗', e); }
}

function ensureAudio() {
  if (window.Tone && Tone.context.state !== 'running') Tone.start();
}

// 木琴式翻牌聲
function playFlip() {
  try {
    ensureAudio();
    if (!sfxFlip || Tone.context.state !== 'running') return;
    sfxFlip.triggerAttackRelease('G4', '32n');
  } catch(e) {}
}

// 木琴三音上行：Do Mi Sol
function playMatch() {
  try {
    ensureAudio();
    if (!sfxMatch || Tone.context.state !== 'running') return;
    const now = Tone.now();
    sfxMatch.triggerAttackRelease('C5', '8n', now);
    sfxMatch.triggerAttackRelease('E5', '8n', now + 0.12);
    sfxMatch.triggerAttackRelease('G5', '4n', now + 0.24);
  } catch(e) {}
}

// 溫和低音咚
function playWrong() {
  try {
    ensureAudio();
    if (!sfxWrong || Tone.context.state !== 'running') return;
    sfxWrong.triggerAttackRelease('C2', '8n');
  } catch(e) {}
}

// 勝利鋼琴旋律：Do Mi Sol Do (高八度)
function playWin() {
  try {
    ensureAudio();
    if (!sfxWin || Tone.context.state !== 'running') return;
    const now = Tone.now();
    const melody = ['C4','E4','G4','C5','E5','G5','C6'];
    melody.forEach((note, i) => {
      sfxWin.triggerAttackRelease(note, i < melody.length-1 ? '8n' : '2n', now + i * 0.18);
    });
  } catch(e) {}
}

// ======================================================
// 語音朗讀 (Web Speech API)
// ======================================================
function initVoice() {
  if (!window.speechSynthesis) return;

  function findZhVoice() {
    const voices = speechSynthesis.getVoices();
    // 優先找台灣中文，其次大陸中文，其次任何中文
    zhVoice =
      voices.find(v => v.lang === 'zh-TW') ||
      voices.find(v => v.lang === 'zh-CN') ||
      voices.find(v => v.lang.startsWith('zh')) ||
      null;
    voiceReady = true;
  }

  findZhVoice();
  // 有些瀏覽器語音清單是非同步載入的
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = findZhVoice;
  }
}

function sayAloud(text) {
  if (!window.speechSynthesis || !voiceReady) return;
  try {
    speechSynthesis.cancel(); // 取消上一句
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang  = 'zh-TW';
    utter.rate  = 0.9;   // 稍慢，適合幼兒
    utter.pitch = 1.3;   // 稍高音，活潑感
    utter.volume = 1;
    if (zhVoice) utter.voice = zhVoice;
    speechSynthesis.speak(utter);
  } catch(e) {}
}


// ======================================================
// 難度選擇
// ======================================================
function selectDiff(n) {
  ACTIVE_PAIRS = n;
  [4,6,8].forEach(x => {
    const el = document.getElementById('diff-'+x);
    if (el) el.classList.toggle('selected', x === n);
  });
}

// ======================================================
// 計時器
// ======================================================
function formatTime(ms) {
  const totalSec = Math.floor(ms / 1000);
  const min = Math.floor(totalSec / 60);
  const sec = totalSec % 60;
  return `${min}:${sec.toString().padStart(2, '0')}`;
}

function startTimer() {
  clearInterval(timerInterval);
  timerStart = Date.now();
  const box = document.getElementById('timer-box');
  box.style.display = '';  // 顯示計時器
  const display = document.getElementById('timer-display');
  display.textContent = '0:00';

  timerInterval = setInterval(() => {
    display.textContent = formatTime(Date.now() - timerStart);
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  const elapsed = Date.now() - timerStart;
  document.getElementById('timer-box').style.display = 'none!important';
  return elapsed;
}

// ======================================================
// 回到開始畫面
// ======================================================
function goToStart() {
  clearInterval(timerInterval);
  document.getElementById('timer-box').style.display = 'none';
  document.getElementById('win-modal').classList.remove('show');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
  setBanner('準備釣魚中...');
  speak('start');
}


function startGame() {
  ensureAudio();

  // 中班：每次開始重新隨機產生 1-10 的組合，保持新鮮感
  GAME_DATA = createDefaultData();

  totalPairs  = ACTIVE_PAIRS;
  matchedCount = 0;
  flippedA = null;
  flippedB = null;
  isLocked = false;

  clearTimeout(hintTimeout);

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  document.getElementById('game-screen').classList.add('flex','flex-col');
  document.getElementById('win-modal').classList.remove('show');

  startTimer();

  updateScore();
  renderGame();
  setPondHighlight('a');
  speak('pickA');
  setBanner('👆 先翻藍色數字池塘！', 'step-a');
  scheduleHint();
}

function goToStart() {
  document.getElementById('win-modal').classList.remove('show');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
  setBanner('準備釣魚中...');
  speak('start');
}

// ======================================================
// 渲染遊戲卡片
// ======================================================
function renderGame() {
  const pairs = shuffle(GAME_DATA).slice(0, totalPairs);

  const cardsA = shuffle(pairs.map((p,i) => ({ pairId:p.id, img:p.imgA, type:'A' })));
  const cardsB = shuffle(pairs.map((p,i) => ({ pairId:p.id, img:p.imgB, type:'B' })));

  renderZone(document.getElementById('grid-a'), cardsA);
  renderZone(document.getElementById('grid-b'), cardsB);
}

function renderZone(container, cards) {
  container.innerHTML = '';
  cards.forEach(card => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap new-card';
    wrap.dataset.pairId = card.pairId;
    wrap.dataset.type   = card.type;

    const icon = card.type === 'A' ? '🐟' : '🐡';
    const frontCls = 'card-back-face type-' + card.type.toLowerCase();

    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-face ${frontCls}">
          <span style="position:relative;z-index:1">${icon}</span>
        </div>
        <div class="card-face card-front-face">
          <img src="${card.img}" alt="card">
        </div>
      </div>
    `;

    wrap.addEventListener('click', () => onCardClick(wrap));
    container.appendChild(wrap);

    setTimeout(() => wrap.classList.remove('new-card'), 500);
  });
}

// ======================================================
// 翻牌邏輯（嚴格引導：先A後B）
// ======================================================
function onCardClick(wrap) {
  if (isLocked) return;
  if (wrap.classList.contains('matched')) return;
  if (wrap.classList.contains('flipped')) return;

  ensureAudio();
  clearTimeout(hintTimeout);
  removeHint();

  const type = wrap.dataset.type;

  // 引導邏輯：必須先翻A
  if (type === 'B' && !flippedA) {
    // 輕微提示：搖晃橘色池塘，提醒先翻藍色
    showToast('👆 先翻藍色數字喔！');
    const pondA = document.querySelector('.pond-a');
    pondA.style.transform = 'scale(1.03)';
    setTimeout(() => pondA.style.transform = '', 400);
    return;
  }

  // 若再翻同區A，先蓋回
  if (type === 'A' && flippedA) {
    flippedA.classList.remove('flipped');
    flippedA = null;
  }
  // 若再翻同區B，先蓋回
  if (type === 'B' && flippedB) {
    flippedB.classList.remove('flipped');
    flippedB = null;
  }

  playFlip();
  wrap.classList.add('flipped');

  if (type === 'A') {
    flippedA = wrap;
    setPondHighlight('b');
    setBanner('👆 再翻橘色，找到一樣多的朋友！', 'step-b');
    speak('pickB');
    scheduleHint();
    return;
  }

  // type === 'B'，且已有 flippedA
  flippedB = wrap;
  checkMatch();
}

function checkMatch() {
  isLocked = true;
  const idA = flippedA.dataset.pairId;
  const idB = flippedB.dataset.pairId;

  if (idA === idB) {
    onMatch();
  } else {
    onWrong();
  }
}

// ======================================================
// 配對成功
// ======================================================
function onMatch() {
  playMatch();
  speak('match');
  setBanner('🎉 配對成功！太棒了！', 'step-ok');

  const cardA = flippedA;
  const cardB = flippedB;

  setTimeout(() => {
    // 飛往魚簍動畫
    [cardA, cardB].forEach(card => {
      card.classList.add('matched');
      flyToBucket(card);
    });

    matchedCount++;
    setTimeout(() => {
      updateScore();
      isLocked = false;
      flippedA = null;
      flippedB = null;

      if (matchedCount >= totalPairs) {
        setTimeout(showWin, 600);
      } else {
        setPondHighlight('a');
        setBanner('👆 繼續！先翻藍色數字池塘！', 'step-a');
        speak('pickA');
        scheduleHint();
      }
    }, 500);
  }, 1200);
}

// ======================================================
// 配對錯誤
// ======================================================
function onWrong() {
  playWrong();
  speak('wrong');
  setBanner('💪 再試試看！', '');

  const cardA = flippedA;
  const cardB = flippedB;

  // 抖動動畫
  cardA.classList.add('wrong');
  cardB.classList.add('wrong');

  setTimeout(() => {
    cardA.classList.remove('flipped', 'wrong');
    cardB.classList.remove('flipped', 'wrong');
    flippedA = null;
    flippedB = null;
    isLocked = false;

    setPondHighlight('a');
    setBanner('👆 先翻藍色數字池塘！', 'step-a');
    scheduleHint();
  }, 1200);
}

// ======================================================
// 提示功能
// ======================================================
function scheduleHint() {
  clearTimeout(hintTimeout);
  hintTimeout = setTimeout(() => {
    giveHint();
  }, 15000);
}

function giveHint() {
  clearTimeout(hintTimeout);
  removeHint();
  speak('hint');
  showToast('💡 閃爍的牌是提示喔！');

  // 找出還未配對且未翻開的牌，隨機選一張給提示
  const pool = flippedA
    ? [...document.querySelectorAll('#grid-b .card-wrap:not(.matched):not(.flipped)')]
    : [...document.querySelectorAll('#grid-a .card-wrap:not(.matched):not(.flipped)')];

  if (pool.length > 0) {
    const target = rand(pool);
    target.classList.add('hinting');
    hintTimeout = setTimeout(() => target.classList.remove('hinting'), 5000);
  }
}

function removeHint() {
  document.querySelectorAll('.hinting').forEach(el => el.classList.remove('hinting'));
}

// ======================================================
// 池塘高光引導
// ======================================================
function setPondHighlight(which) {
  document.querySelector('.pond-a').classList.toggle('pond-active', which === 'a');
  document.querySelector('.pond-b').classList.toggle('pond-active', which === 'b');

  const arrow = document.getElementById('guide-arrow');
  const isMobile = window.innerWidth < 768;
  if (isMobile) {
    // 手機：上下排列，箭頭朝下
    arrow.textContent = which === 'a' ? '⬇️' : '⬆️';
  } else {
    // 平板/桌機：左右排列
    arrow.textContent = which === 'a' ? '➡️' : '⬅️';
  }
}

// ======================================================
// 飛向魚簍動畫
// ======================================================
function flyToBucket(card) {
  const rect = card.getBoundingClientRect();
  const bucket = document.getElementById('bucket-icon');
  const bRect = bucket.getBoundingClientRect();

  const clone = document.createElement('div');
  clone.className = 'flying-card';
  clone.style.cssText = `
    left:${rect.left}px; top:${rect.top}px;
    width:${rect.width}px; height:${rect.height}px;
    background:white;
  `;
  clone.innerHTML = card.querySelector('.card-front-face').innerHTML;
  document.body.appendChild(clone);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const tx = bRect.left + bRect.width/2 - rect.width/2 - rect.left;
      const ty = bRect.top  + bRect.height/2 - rect.height/2 - rect.top;
      clone.style.transform = `translate(${tx}px, ${ty}px) scale(0.15) rotate(20deg)`;
      clone.style.opacity = '0.3';
      setTimeout(() => {
        clone.remove();
        // 魚簍搖晃
        const b = document.getElementById('bucket-icon');
        b.classList.remove('bucket-bounce');
        void b.offsetWidth;
        b.classList.add('bucket-bounce');
        setTimeout(() => b.classList.remove('bucket-bounce'), 700);
      }, 750);
    });
  });
}

// ======================================================
// 分數更新
// ======================================================
function updateScore() {
  const fishEl = document.getElementById('fish-score');
  fishEl.innerHTML = '';
  for (let i = 0; i < totalPairs; i++) {
    const f = document.createElement('span');
    f.className = 'fish-icon';
    f.textContent = i < matchedCount ? '🐟' : '⭕';
    if (i === matchedCount - 1) f.classList.add('earned');
    fishEl.appendChild(f);
  }
  document.getElementById('score-text').textContent = `${matchedCount} / ${totalPairs}`;
}

// ======================================================
// 煙火特效
// ======================================================
function launchFireworks() {
  const colors = ['#f7c5c5','#d4b8f0','#b5d8f7','#b8e8c8','#fde9a2','#fdd0a2','#f0b8d8'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const cx = 20 + Math.random() * 60;
      const cy = 20 + Math.random() * 50;
      for (let j = 0; j < 12; j++) {
        const p = document.createElement('div');
        p.className = 'firework-particle';
        const angle = (j/12)*360;
        const dist  = 60 + Math.random()*80;
        p.style.cssText = `
          left:${cx}vw; top:${cy}vh;
          background:${rand(colors)};
          --dx:${Math.cos(angle*Math.PI/180)*dist}px;
          --dy:${Math.sin(angle*Math.PI/180)*dist}px;
          animation-delay:${Math.random()*0.2}s;
        `;
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1200);
      }
    }, i*250);
  }
}

// ======================================================
// 勝利
// ======================================================
function showWin() {
  const elapsed = stopTimer();

  playWin();
  speak('win');
  launchFireworks();

  // 設定勝利畫面
  const fishStr = '🐟'.repeat(matchedCount);
  document.getElementById('win-fish-display').textContent = fishStr;
  document.getElementById('win-title').textContent = rand(['超厲害！','你是高手！','釣魚大師！']);
  document.getElementById('win-msg').textContent = `釣到了 ${matchedCount} 條魚！`;
  document.getElementById('win-time').textContent = formatTime(elapsed);

  // 升級提示（未達最高難度才顯示）
  const hint = document.getElementById('level-up-hint');
  hint.classList.toggle('hidden', ACTIVE_PAIRS >= 8);

  document.getElementById('win-modal').classList.add('show');
}



// ======================================================
// 泡泡背景
// ======================================================
function createBubbles() {
  const colors = [
    'rgba(181,216,247,0.55)', // 粉藍
    'rgba(212,184,240,0.5)',  // 粉紫
    'rgba(247,197,197,0.5)',  // 粉桃
    'rgba(184,232,200,0.5)',  // 粉綠
    'rgba(253,233,162,0.55)', // 粉黃
    'rgba(253,208,162,0.5)',  // 粉橘
  ];
  setInterval(() => {
    const b = document.createElement('div');
    b.className = 'bubble';
    const s = 18 + Math.random()*55;
    const col = colors[Math.floor(Math.random()*colors.length)];
    b.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}vw;background:${col};border:2px solid rgba(255,255,255,0.6);animation-duration:${7+Math.random()*7}s;animation-delay:${Math.random()*2}s`;
    document.getElementById('bubbles').appendChild(b);
    setTimeout(() => b.remove(), 16000);
  }, 900);
}

// ======================================================
// 初始化
// ======================================================
function init() {
  createBubbles();
  initSound();
  initVoice();
  loadData();
  selectDiff(6);
  // 非同步等待圖片生成完成
  setTimeout(() => {
    document.getElementById('start-btn').disabled = false;
    document.getElementById('loading-text').textContent = `3 到 20 隨機出題，準備好了！`;
    speak('start');
  }, 300);
}

window.onload = init;
</script>
